<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1>⚔️ Battle Arena</h1>
                <p>Find an opponent and start a coding duel</p>
            </div>

            <div id="lobbyView" class="max-w-md mx-auto">
                <div class="card card-glow text-center p-8">
                    <div id="defaultLobby">
                        <span style="font-size:4rem;display:block;margin-bottom:1.5rem;">⚔️</span>
                        <h3 style="font-weight:700;font-size:1.5rem;margin-bottom:1rem;">Ready for a Duel?</h3>
                        <p style="color:var(--text-secondary);margin-bottom:2rem;">The system will match you with a
                            waiting player and select a random problem.</p>
                        <button onclick="findRandomBattle()" class="btn btn-primary btn-lg w-full">Find Random
                            Battle</button>
                    </div>

                    <div id="waitingLobby" style="display:none;">
                        <div class="spinner mx-auto mb-4" style="width:3rem;height:3rem;"></div>
                        <h3 style="font-weight:700;font-size:1.5rem;margin-bottom:1rem;">Finding Opponent...</h3>
                        <p style="color:var(--text-secondary);">Please wait while we match you with another player.</p>
                        <button onclick="cancelSearch()" class="btn btn-secondary mt-6">Cancel Search</button>
                    </div>

                    <div id="matchedLobby" style="display:none;">
                        <div class="success-icon mb-4">✅</div>
                        <h3 style="font-weight:700;font-size:1.5rem;margin-bottom:1rem;color:var(--success);">Battle
                            Found!</h3>
                        <div class="mb-6 p-4 rounded bg-dark-lighter">
                            <p id="opponentInfo" class="mb-2 font-bold"></p>
                            <p id="problemInfo" class="text-secondary text-sm"></p>
                        </div>
                        <p style="color:var(--text-secondary);">Redirecting to battle room...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/battle.js"></script>
</body>

</html>
