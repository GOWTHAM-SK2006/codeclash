<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container" style="max-width:900px;">
            <div class="page-header" style="text-align:center; margin-bottom: 3rem;">
                <h1
                    style="font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, #FFF, #FF6B00); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(255,107,0,0.2));">
                    🏆 Leaderboard</h1>
                <p style="font-size: 1.1rem; color: var(--text-secondary); margin-top: 0.5rem; opacity: 0.8;">Top coders
                    ranked by battle performance</p>
            </div>

            <div id="leaderboard">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 5px rgba(255, 107, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 107, 0, 0.5);
            }

            100% {
                box-shadow: 0 0 5px rgba(255, 107, 0, 0.2);
            }
        }

        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 4rem;
            padding: 0 1rem;
        }

        .podium-item {
            flex: 1;
            max-width: 260px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease both;
        }

        .podium-item:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 107, 0, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .podium-item.first {
            height: 320px;
            border-color: rgba(255, 107, 0, 0.3);
            background: linear-gradient(180deg, rgba(255, 107, 0, 0.1), transparent);
            z-index: 2;
            animation: fadeInUp 0.6s ease both, float 4s ease-in-out infinite;
        }

        .podium-item.second {
            height: 280px;
            animation-delay: 0.1s;
        }

        .podium-item.third {
            height: 260px;
            animation-delay: 0.2s;
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            margin: -40px auto 1rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .first .rank-badge {
            background: linear-gradient(135deg, #FFD700, #B8860B);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .second .rank-badge {
            background: linear-gradient(135deg, #C0C0C0, #808080);
            color: #000;
        }

        .third .rank-badge {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: #000;
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            margin: 0.5rem 0;
            letter-spacing: -1px;
        }

        .podium-stats {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-list {
            display: grid;
            gap: 0.75rem;
            animation: fadeInUp 0.6s ease both 0.3s;
        }

        .leaderboard-card {
            display: grid;
            grid-template-columns: 80px 1fr auto auto;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .leaderboard-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.01);
        }

        .card-rank {
            font-weight: 800;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card-user {
            display: flex;
            flex-direction: column;
        }

        .card-user .name {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .card-user .handle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-stats {
            display: flex;
            gap: 1.5rem;
            margin-right: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .card-score {
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--accent);
            min-width: 80px;
            text-align: right;
        }

        @media (max-width: 768px) {
            .podium-container {
                flex-direction: column;
                align-items: center;
                gap: 3rem;
            }

            .podium-item {
                width: 100%;
                height: auto !important;
                padding-top: 3rem;
            }

            .podium-item.first {
                order: -1;
            }

            .card-stats {
                display: none;
            }
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/leaderboard.js"></script>
</body>

</html>
