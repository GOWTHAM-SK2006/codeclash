<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — CodeClash</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glow-color: rgba(255, 107, 0, 0.4);
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 107, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 0, 0);
            }
        }

        .animate-fade-in {
            animation: fadeInScale 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .stagger-card {
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .dashboard-hero {
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.15), rgba(0, 0, 0, 0.4));
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .dashboard-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-subtle) 0%, transparent 70%);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-size: 2.22rem;
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        .hero-content p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .stat-card-premium {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .stat-card-premium:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 107, 0, 0.4);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7), 0 0 25px -5px rgba(255, 107, 0, 0.25);
        }

        .stat-card-premium .icon-wrapper {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.2), rgba(255, 107, 0, 0.05));
            color: var(--accent);
            margin-bottom: 0.5rem;
            border: 1px solid rgba(255, 107, 0, 0.2);
        }

        .stat-card-premium .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-card-premium .stat-label {
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .stat-card-premium .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin-top: 0.25rem;
        }

        .live-pulse {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0, 200, 83, 0.12);
            color: var(--success);
            padding: 0.6rem 1.2rem;
            border-radius: 99px;
            font-weight: 800;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 200, 83, 0.25);
            animation: pulseGlow 2s infinite;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--success);
        }

        /* Match History Specifics */
        .history-filters {
            display: flex;
            gap: 1rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .history-table-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .history-table th {
            padding: 1.25rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }

        .history-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .history-table tr:hover td {
            background: rgba(255, 107, 0, 0.03);
            color: #fff;
        }

        .status-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-badge.finished {
            background: rgba(0, 200, 83, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 200, 83, 0.2);
        }

        .status-badge.cancelled {
            background: rgba(255, 61, 0, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 61, 0, 0.2);
        }

        .status-badge.draw {
            background: rgba(255, 179, 0, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 179, 0, 0.2);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
        }

        .player-info i {
            color: var(--text-muted);
            width: 14px;
            height: 14px;
        }

        .winner-highlight {
            color: var(--accent);
            font-weight: 800;
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            background: #050505;
        }

        .admin-sidebar {
            background: #0a0a0a;
            border-right: 1px solid var(--border);
            padding: 1.5rem;
        }


        .admin-content {
            padding: 1.2rem;
        }

        .admin-nav-btn {
            width: 100%;
            text-align: left;
            padding: 0.6rem 0.7rem;
            border-radius: 8px;
            border: 1px solid transparent;
            color: var(--text-secondary);
            background: transparent;
            cursor: pointer;
        }

        .admin-nav-btn.active {
            background: var(--accent-subtle);
            color: var(--accent);
            border-color: rgba(255, 107, 0, .35);
        }

        .admin-grid {
            display: grid;
            gap: .9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: .8rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .88rem;
        }

        .admin-table th,
        .admin-table td {
            border-bottom: 1px solid var(--border);
            padding: .55rem;
            text-align: left;
            white-space: nowrap;
        }

        .admin-scroll {
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .filters {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin-bottom: .6rem;
        }

        .filters input,
        .filters select {
            background: #0d0d0d;
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            padding: .45rem .55rem;
        }

        .status-live {
            color: var(--success);
            font-weight: 700;
        }

        .status-sub {
            color: var(--accent);
            font-weight: 700;
        }

        /* Modal Styles */
        .admin-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }

        .admin-modal-card {
            background: #111;
            border: 1px solid var(--border);
            width: 95%;
            max-width: 900px;
            height: 85vh;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .admin-modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 107, 0, 0.02);
        }

        .admin-modal-tabs {
            display: flex;
            background: #0a0a0a;
            padding: 0.5rem 1.5rem;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.8rem 1rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .modal-tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        .admin-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: #555;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--accent);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tab-content {
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(10px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .wizard-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        .wizard-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 24px;
            box-shadow: 0 0 100px rgba(255, 107, 0, 0.1);
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h2 style="font-size:1.2rem;font-weight:800;">CodeClash <span style="color:var(--accent)">Admin</span></h2>
            <p style="color:var(--text-secondary);font-size:.82rem;margin:.3rem 0 1rem;">Control Center</p>
            <div id="adminNav" class="admin-grid"></div>
            <button id="adminLogoutBtn" class="btn btn-secondary" style="width:100%;margin-top:1rem;">Logout</button>
        </aside>
        <main class="admin-content">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:.8rem;flex-wrap:wrap;">
                <h1 id="sectionTitle" style="font-size:1.35rem;font-weight:800;">Dashboard</h1>
                <span id="liveCounter" class="badge badge-easy">LIVE: 0</span>
            </div>
            <div id="adminAlert" class="alert alert-error" style="display:none;margin-top:.8rem;"></div>
            <div id="sectionRoot" style="margin-top:.9rem;"></div>
        </main>
    </div>

    <!-- Advanced Admin Control Panel Modal -->
    <div id="adminModalOverlay" class="admin-modal-overlay" style="display:none;">
        <div class="admin-modal-card">
            <div class="admin-modal-header" id="modalHeader">
                <h2 id="modalEventTitle">Event Management</h2>
                <button onclick="closeAdminModal()" class="close-btn">✕</button>
            </div>
            <div class="admin-modal-tabs" id="modalTabs">
                <button class="modal-tab-btn active" data-tab="overview">Overview</button>
                <button class="modal-tab-btn" data-tab="bidding">Bidding</button>
                <button class="modal-tab-btn" data-tab="problems">Problems</button>
                <button class="modal-tab-btn" data-tab="participants">Participants</button>
                <button class="modal-tab-btn" data-tab="results">Results</button>
                <button class="modal-tab-btn" data-tab="settings">Settings</button>
            </div>
            <div class="admin-modal-body" id="modalBody">
                <!-- Dynamic Content -->
            </div>
        </div>
    </div>

    <script src="js/admin-dashboard.js"></script>
</body>

</html>
