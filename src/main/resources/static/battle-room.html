<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Room — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container">
            <div id="battleView">
                <div class="timer" id="timer">15:00</div>

                <div class="battle-arena">
                    <div class="player-panel">
                        <h3 style="font-weight:700;text-align:center;margin-bottom:1rem;" id="p1Name">Player 1</h3>
                        <div style="text-align:center;color:var(--text-secondary);font-size:0.875rem;">Coding...</div>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="player-panel">
                        <h3 style="font-weight:700;text-align:center;margin-bottom:1rem;" id="p2Name">Player 2</h3>
                        <div style="text-align:center;color:var(--text-secondary);font-size:0.875rem;">Coding...</div>
                    </div>
                </div>

                <div class="card" style="margin-top:1.5rem;">
                    <div
                        style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;">
                        <h3 style="font-weight:700;" id="battleProblemTitle">Problem</h3>
                        <span id="difficultyBadge" class="badge">Easy</span>
                    </div>
                    <p style="color:var(--text-secondary);margin-bottom:1rem;" id="battleProblemDesc"></p>
                    <textarea id="battleEditor" class="code-editor" placeholder="Write your solution..."></textarea>
                    <div style="display:flex;gap:0.75rem;margin-top:1rem;">
                        <button onclick="submitBattleSolution()" class="btn btn-primary btn-lg" style="flex:1;">⚡ Submit
                            Solution</button>
                        <button onclick="cancelMatch()" class="btn btn-secondary btn-lg" style="min-width:180px;">❌ Cancel
                            Match</button>
                    </div>
                </div>

                <div id="battleResult" style="display:none;margin-top:1.5rem;"></div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/battle-room.js"></script>
</body>

</html>
