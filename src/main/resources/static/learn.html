<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Programming — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1>Learn Programming</h1>
                <p>Master programming with structured courses and hands-on exercises.</p>
            </div>

            <!-- Languages View -->
            <div id="languagesView">
                <div class="languages-grid" id="languagesGrid">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Topics View (hidden by default) -->
            <div id="topicsView" style="display:none;">
                <button onclick="showLanguages()" class="btn btn-ghost" style="margin-bottom:1.5rem;">← Back to
                    Languages</button>
                <h2 id="topicsTitle" style="font-size:1.5rem;font-weight:700;margin-bottom:1rem;"></h2>
                <div class="topics-list" id="topicsList"></div>
            </div>

            <!-- Lessons View (hidden by default) -->
            <div id="lessonsView" style="display:none;">
                <button onclick="showTopics(currentLanguageId)" class="btn btn-ghost" style="margin-bottom:1.5rem;">←
                    Back to Topics</button>
                <h2 id="lessonsTitle" style="font-size:1.5rem;font-weight:700;margin-bottom:1rem;"></h2>
                <div id="lessonContent"></div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('learn');

        let currentLanguageId = null;

        async function loadLanguages() {
            try {
                const langs = await api.getLanguages();
                document.getElementById('languagesGrid').innerHTML = langs.map(l => `
                    <div class="language-card" onclick="showTopics(${l.id}, '${l.name}')">
                        <span class="lang-icon">${l.icon || '📄'}</span>
                        <h3>${l.name}</h3>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('languagesGrid').innerHTML = '<div class="empty-state"><p>Could not load languages.</p></div>';
            }
        }

        function showLanguages() {
            document.getElementById('languagesView').style.display = '';
            document.getElementById('topicsView').style.display = 'none';
            document.getElementById('lessonsView').style.display = 'none';
        }

        async function showTopics(langId, langName) {
            currentLanguageId = langId;
            document.getElementById('languagesView').style.display = 'none';
            document.getElementById('topicsView').style.display = '';
            document.getElementById('lessonsView').style.display = 'none';
            if (langName) document.getElementById('topicsTitle').textContent = langName + ' Topics';

            try {
                const topics = await api.getTopics(langId);
                document.getElementById('topicsList').innerHTML = topics.length === 0
                    ? '<div class="empty-state"><p>No topics yet for this language.</p></div>'
                    : topics.map(t => `
                        <div class="topic-item" onclick="showLessons(${t.id}, '${t.title}')">
                            <div>
                                <h3 style="font-weight:600;">${t.title}</h3>
                                <p style="color:var(--text-secondary);font-size:0.8125rem;margin-top:0.25rem;">${t.description || ''}</p>
                            </div>
                            <span class="badge badge-${(t.difficulty || '').toLowerCase() === 'beginner' ? 'easy' : (t.difficulty || '').toLowerCase() === 'intermediate' ? 'medium' : 'hard'}">${t.difficulty || ''}</span>
                        </div>
                    `).join('');
            } catch (e) {
                document.getElementById('topicsList').innerHTML = '<div class="empty-state"><p>Could not load topics.</p></div>';
            }
        }

        async function showLessons(topicId, topicTitle) {
            document.getElementById('topicsView').style.display = 'none';
            document.getElementById('lessonsView').style.display = '';
            document.getElementById('lessonsTitle').textContent = topicTitle;

            try {
                const lessons = await api.getLessons(topicId);
                if (lessons.length === 0) {
                    document.getElementById('lessonContent').innerHTML = '<div class="empty-state"><p>No lessons yet for this topic.</p></div>';
                    return;
                }
                document.getElementById('lessonContent').innerHTML = lessons.map((l, i) => `
                    <div class="card" style="margin-bottom:1rem;">
                        <h3 style="font-weight:700;margin-bottom:0.75rem;color:var(--accent);">Lesson ${i + 1}: ${l.title}</h3>
                        <div style="color:var(--text-secondary);line-height:1.8;margin-bottom:1rem;">${l.content || ''}</div>
                        ${l.codeExample ? `
                            <div style="margin-bottom:1rem;">
                                <h4 style="font-size:0.8125rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px;">Example</h4>
                                <pre style="background:#0D0D0D;border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;font-family:'JetBrains Mono',monospace;font-size:0.8125rem;overflow-x:auto;color:#E0E0E0;line-height:1.6;">${l.codeExample}</pre>
                            </div>
                        ` : ''}
                        ${l.exercise ? `
                            <div style="background:var(--accent-subtle);border:1px solid rgba(255,107,0,0.15);border-radius:var(--radius-sm);padding:1rem;">
                                <h4 style="font-size:0.8125rem;font-weight:600;color:var(--accent);margin-bottom:0.5rem;">💡 Exercise</h4>
                                <p style="color:var(--text-secondary);font-size:0.875rem;">${l.exercise}</p>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('lessonContent').innerHTML = '<div class="empty-state"><p>Could not load lessons.</p></div>';
            }
        }

        loadLanguages();
    </script>
</body>

</html>
