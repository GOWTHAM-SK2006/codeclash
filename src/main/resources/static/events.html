<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events — CodeClash</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .events-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .event-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 107, 0, 0.3);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .event-card.live {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.15);
        }

        .event-card.live::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: glow-slide 2s infinite;
        }

        @keyframes glow-slide {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .badge-live {
            background: #ff6b00;
            color: white;
            animation: pulse 2s infinite;
        }

        .badge-upcoming {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 107, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 0, 0);
            }
        }

        .event-title {
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .event-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .meta-item b {
            display: block;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
        }

        .countdown {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .countdown-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-join {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .no-events {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Code<span style="color:var(--accent)">Clash</span></a>
            <div class="nav-links">
                <a href="/dashboard.html">Dashboard</a>
                <a href="/events.html" class="active">Events</a>
                <a href="/leaderboard.html">Leaderboard</a>
            </div>
            <div id="userProfile" class="user-profile"></div>
        </div>
    </nav>

    <div class="events-container">
        <div style="margin-bottom: 3rem; text-align: center;">
            <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem;">Competitive <span
                    class="text-glow">Events</span></h1>
            <p style="color: var(--text-secondary);">Bid to enter. Dominate to win.</p>
        </div>

        <div id="eventsGrid" class="events-grid">
            <!-- Dynamic Injection -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/events.js"></script>
</body>

</html>
