<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problems — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1>Coding Problems</h1>
                <p>Pick a challenge and sharpen your skills</p>
            </div>

            <div class="filters" id="filters">
                <button class="filter-btn active" onclick="filterProblems('all')">All</button>
                <button class="filter-btn" onclick="filterProblems('Easy')">Easy</button>
                <button class="filter-btn" onclick="filterProblems('Medium')">Medium</button>
                <button class="filter-btn" onclick="filterProblems('Hard')">Hard</button>
            </div>

            <div id="problemsList">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/problems.js"></script>
</body>

</html>
