<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bidding — CodeClash</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .bidding-layout {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .bidding-layout {
                grid-template-columns: 1fr;
            }
        }

        .bid-hero {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .bid-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 107, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .main-timer {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent);
            font-family: monospace;
            letter-spacing: -2px;
            margin: 1rem 0;
            line-height: 1;
        }

        .user-stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2.5rem 0;
        }

        .stat-card {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.2rem;
        }

        .stat-card p {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }

        .stat-card h2 {
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-primary);
        }

        .btn-bid-plus {
            background: linear-gradient(135deg, #ff6b00 0%, #ff9e00 100%);
            border: none;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .btn-bid-plus:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 107, 0, 0.5);
        }

        .btn-bid-plus:active {
            transform: scale(0.9);
        }

        .btn-bid-plus span {
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: -0.3rem;
        }

        .leaderboard-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
        }

        .lb-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .lb-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
            border-radius: 8px;
        }

        .lb-row:last-child {
            border: none;
        }

        .lb-rank {
            width: 30px;
            font-weight: 900;
            text-align: center;
            font-size: 0.9rem;
        }

        .lb-user {
            flex: 1;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .lb-amount {
            color: var(--accent);
            font-weight: 800;
            font-family: monospace;
        }

        .lb-selected {
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            background: var(--success-subtle);
            color: var(--success);
            border-radius: 4px;
            font-weight: 800;
        }

        .rank-up-notif {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--success);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: slide-in 0.5s ease forwards;
            z-index: 1000;
        }

        @keyframes slide-in {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Code<span style="color:var(--accent)">Clash</span></a>
            <div class="nav-links">
                <a href="/dashboard.html">Dashboard</a>
                <a href="/events.html">Events</a>
            </div>
            <div id="userProfile" class="user-profile"></div>
        </div>
    </nav>

    <div class="bidding-layout">
        <div class="main-column">
            <div class="bid-hero">
                <div id="eventStatus"
                    style="font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px;">
                    Upcoming</div>
                <h1 id="eventTitle" style="font-size: 2.5rem; font-weight: 900; margin-top: 0.5rem;">Event Title</h1>

                <div id="timerContainer">
                    <div class="countdown-label" id="timerLabel">Starts In</div>
                    <div class="main-timer" id="mainTime">00:00:00</div>
                </div>

                <div class="user-stats-bar">
                    <div class="stat-card">
                        <p>Your Current Bid</p>
                        <h2 id="userBid">0</h2>
                    </div>
                    <div class="stat-card">
                        <p>Your Rank</p>
                        <h2 id="userRank"># –</h2>
                    </div>
                </div>

                <div id="bidAction" style="display: none;">
                    <button class="btn-bid-plus" id="addBidBtn">
                        +100
                        <span>Bid Coins</span>
                    </button>
                    <p style="margin-top: 1.5rem; font-size: 1.1rem; font-weight: 700;">Remaining Balance: <span
                            id="userBalance" style="color:var(--accent)">0</span> 🪙</p>
                </div>
            </div>

            <div id="resultCard" class="card"
                style="display: none; margin-top: 2rem; border-radius: 24px; padding: 2rem; text-align: center;">
                <!-- Result Message Injection -->
            </div>
        </div>

        <aside class="leaderboard-panel">
            <div class="lb-title">
                🏆 Live Leaderboard
                <span id="lbTotalBidders"
                    style="font-size: 0.8rem; font-weight: 400; color: var(--text-secondary); margin-left: auto;">(0
                    users)</span>
            </div>
            <div id="lbContainer">
                <!-- Leaderboard rows -->
            </div>
        </aside>
    </div>

    <script src="js/api.js"></script>
    <script src="js/bidding.js"></script>
</body>

</html>
