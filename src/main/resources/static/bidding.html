<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bidding — CodeClash</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .bidding-layout {
            max-width: 1400px;
            margin: 0.8rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .bidding-layout {
                grid-template-columns: 1fr;
            }
        }

        .bid-hero {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.8rem 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .bid-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 107, 0, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Status badge */
        .bid-status {
            display: inline-block;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-size: 0.85rem;
            color: var(--accent);
            padding: 0.4rem 1.2rem;
            border: 1px solid rgba(255, 107, 0, 0.25);
            border-radius: 20px;
            background: rgba(255, 107, 0, 0.08);
        }

        .bid-status.live {
            animation: live-pulse 2s ease-in-out infinite;
        }

        @keyframes live-pulse {

            0%,
            100% {
                box-shadow: 0 0 6px rgba(255, 107, 0, 0.15);
            }

            50% {
                box-shadow: 0 0 18px rgba(255, 107, 0, 0.35);
            }
        }

        /* Event title */
        .bid-event-title {
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0.8rem 0 0.3rem;
            color: var(--text-primary);
            line-height: 1.2;
        }

        /* Timer */
        .countdown-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-top: 0.2rem;
        }

        .main-timer {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--accent);
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin: 0.5rem 0 0.3rem;
            line-height: 1;
        }

        /* Stat cards */
        .user-stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.2rem 0;
        }

        .stat-card {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.1rem 1rem;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .stat-card p {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
            letter-spacing: 1.2px;
            font-weight: 700;
        }

        .stat-card h2 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-primary);
        }

        /* Bid button */
        .btn-bid-plus {
            background: linear-gradient(135deg, #ff6b00 0%, #ff9e00 100%);
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 25px rgba(255, 107, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .btn-bid-plus:hover {
            transform: scale(1.12);
            box-shadow: 0 0 45px rgba(255, 107, 0, 0.5);
        }

        .btn-bid-plus:active {
            transform: scale(0.92);
        }

        .btn-bid-plus span {
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-top: -0.2rem;
            letter-spacing: 0.5px;
        }

        .bid-balance {
            margin-top: 1.2rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .bid-balance span {
            color: var(--accent);
            font-weight: 800;
        }

        /* Leaderboard */
        .leaderboard-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            min-height: 300px;
        }

        .lb-title {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .lb-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.3s;
            border-radius: 8px;
        }

        .lb-row:last-child {
            border: none;
        }

        .lb-rank {
            width: 28px;
            font-weight: 900;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .lb-user {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .lb-amount {
            color: var(--accent);
            font-weight: 800;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .lb-selected {
            font-size: 0.6rem;
            padding: 0.15rem 0.45rem;
            background: var(--success-subtle);
            color: var(--success);
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lb-empty {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .lb-empty span {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.6rem;
        }

        /* Rank notification */
        .rank-up-notif {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--success);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: slide-in 0.5s ease forwards;
            z-index: 1000;
        }

        @keyframes slide-in {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="bidding-layout">
        <div class="main-column">
            <div class="bid-hero">
                <div class="bid-status" id="eventStatus">Upcoming</div>
                <h1 class="bid-event-title" id="eventTitle">Event Title</h1>

                <div id="timerContainer">
                    <div class="countdown-label" id="timerLabel">Starts In</div>
                    <div class="main-timer" id="mainTime">00:00:00</div>
                </div>

                <div class="user-stats-bar">
                    <div class="stat-card">
                        <p>Your Current Bid</p>
                        <h2 id="userBid">0</h2>
                    </div>
                    <div class="stat-card">
                        <p>Your Rank</p>
                        <h2 id="userRank"># –</h2>
                    </div>
                </div>

                <div id="bidAction" style="display: none;">
                    <button class="btn-bid-plus" id="addBidBtn">
                        +100
                        <span>Bid Coins</span>
                    </button>
                    <p class="bid-balance">Remaining Balance: <span id="userBalance">0</span> 🪙</p>
                </div>
            </div>

            <div id="resultCard" class="card"
                style="display: none; margin-top: 2rem; border-radius: 24px; padding: 2rem; text-align: center;">
                <!-- Result Message Injection -->
            </div>
        </div>

        <aside class="leaderboard-panel">
            <div class="lb-title">
                🏆 Live Leaderboard
                <span id="lbTotalBidders"
                    style="font-size: 0.75rem; font-weight: 400; color: var(--text-secondary); margin-left: auto;">(0
                    users)</span>
            </div>
            <div id="lbContainer">
                <div class="lb-empty"><span>⏳</span>Waiting for bidders...</div>
            </div>
        </aside>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/bidding.js"></script>
</body>

</html>
