<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to your CodeClash account</p>

            <div id="alert" class="alert alert-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Log In</button>
            </form>

            <p class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></p>
            <button id="adminLoginBtn" type="button" class="btn btn-secondary btn-lg" style="width:100%;margin-top:0.65rem;">Admin Login</button>
            <p style="text-align:center;color:var(--text-secondary);font-size:0.82rem;margin-top:0.55rem;">
                Admin credentials: <strong>admin</strong> / <strong>admin@123</strong>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('login');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const data = await api.login(username, password);
                api.setAuth(data);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showAlert('alert', err.message);
            }
        });

        document.getElementById('adminLoginBtn').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin@123' })
                });

                const payload = await res.json().catch(() => ({}));
                if (!res.ok) {
                    showAlert('alert', payload?.message || payload?.error || 'Admin login failed');
                    return;
                }

                if (payload?.token) {
                    localStorage.setItem('cc_admin_session', payload.token);
                }

                window.location.href = payload?.redirect || 'admin-dashboard.html';
            } catch (_err) {
                showAlert('alert', 'Admin access is disabled in development');
            }
        });
    </script>
</body>

</html>
