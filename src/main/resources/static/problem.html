<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solve Problem — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container">
            <a href="problems.html" class="btn btn-ghost" style="margin-bottom:1rem;">← Back to Problems</a>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;" id="problemLayout">
                <!-- Problem Description -->
                <div>
                    <div class="card" id="problemInfo">
                        <div class="spinner"></div>
                    </div>
                </div>

                <!-- Code Editor -->
                <div>
                    <div class="card">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
                            <h3 style="font-weight:700;">Code Editor</h3>
                            <select id="langSelect" class="form-input"
                                style="width:auto;padding:0.375rem 0.75rem;font-size:0.8125rem;">
                                <option value="python">Python</option>
                                <option value="java">Java</option>
                                <option value="javascript">JavaScript</option>
                                <option value="c">C</option>
                                <option value="cpp">C++</option>
                            </select>
                        </div>
                        <textarea id="codeEditor" class="code-editor" spellcheck="false"
                            placeholder="Write your solution here..."></textarea>
                        <div style="display:flex;gap:0.75rem;margin-top:1rem;">
                            <button onclick="runCode()" class="btn btn-secondary">▶ Run Code</button>
                            <button onclick="submitCode()" class="btn btn-primary">Submit Solution</button>
                        </div>
                        <div id="output" style="display:none;margin-top:1rem;">
                            <h4
                                style="font-size:0.8125rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.5rem;">
                                Output</h4>
                            <pre id="outputContent"
                                style="background:#0D0D0D;border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;font-family:'JetBrains Mono',monospace;font-size:0.8125rem;color:#E0E0E0;min-height:60px;"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('problems');

        let currentProblem = null;
        const params = new URLSearchParams(window.location.search);
        const problemId = params.get('id');

        (async function () {
            if (!problemId) { window.location.href = 'problems.html'; return; }

            try {
                currentProblem = await api.getProblem(problemId);
                document.title = `${currentProblem.title} — CodeClash`;
                document.getElementById('problemInfo').innerHTML = `
                    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
                        <span class="badge badge-${currentProblem.difficulty.toLowerCase()}">${currentProblem.difficulty}</span>
                        <span style="color:var(--accent);font-weight:600;font-size:0.8125rem;">🪙 ${currentProblem.points} pts</span>
                    </div>
                    <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:1rem;">${currentProblem.title}</h2>
                    <div style="color:var(--text-secondary);line-height:1.8;margin-bottom:1.5rem;white-space:pre-wrap;">${currentProblem.description}</div>
                    ${currentProblem.testCases ? `
                        <div style="background:var(--bg-tertiary);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1rem;">
                            <h4 style="font-size:0.75rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:0.5rem;">Test Cases</h4>
                            <pre style="font-family:'JetBrains Mono',monospace;font-size:0.8125rem;color:#E0E0E0;white-space:pre-wrap;">${currentProblem.testCases}</pre>
                        </div>
                    ` : ''}
                `;

                if (currentProblem.starterCode) {
                    document.getElementById('codeEditor').value = currentProblem.starterCode;
                }
            } catch (e) {
                document.getElementById('problemInfo').innerHTML = '<div class="empty-state"><p>Problem not found.</p></div>';
            }
        })();

        function runCode() {
            const output = document.getElementById('output');
            const content = document.getElementById('outputContent');
            output.style.display = 'block';
            content.style.color = 'var(--text-secondary)';
            content.textContent = '⏳ Running your code... (Note: Full code execution requires Docker sandbox setup)';
        }

        async function submitCode() {
            if (!requireAuth()) return;

            const code = document.getElementById('codeEditor').value;
            const lang = document.getElementById('langSelect').value;
            const output = document.getElementById('output');
            const content = document.getElementById('outputContent');
            output.style.display = 'block';

            try {
                const result = await api.submitCode(problemId, code, lang);
                if (result.status === 'ACCEPTED') {
                    content.style.color = 'var(--success)';
                    content.textContent = `✅ ${result.output}\n\nCoins earned: +${currentProblem.points} 🪙`;
                } else {
                    content.style.color = 'var(--danger)';
                    content.textContent = `❌ ${result.status}\n\n${result.output}`;
                }
            } catch (e) {
                content.style.color = 'var(--danger)';
                content.textContent = `Error: ${e.message}`;
            }
        }
    </script>
</body>

</html>
