<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --bg-primary: #0F0F0F;
            --bg-secondary: #1A1A1A;
            --accent: #FF6B00;
            --accent-hover: #FF8C32;
        }

        body {
            background-color: var(--bg-primary);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .profile-card {
            background-color: var(--bg-secondary);
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .profile-card:hover {
            border-color: #3A3A3A;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content min-h-screen pt-24 pb-12">
        <div class="container mx-auto px-4 max-w-4xl space-y-10">

            <!-- User Details Section -->
            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-2 h-8 bg-[#FF6B00] rounded-full"></div>
                    <h2 class="text-2xl font-extrabold tracking-tight">User Details</h2>
                </div>
                <div class="profile-card p-6 shadow-xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Username</label>
                            <p id="profileUsername" class="text-lg font-semibold text-white tracking-wide">...</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Email
                                Address</label>
                            <p id="profileEmail" class="text-lg font-semibold text-white tracking-wide">...</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Coin Summary Section -->
            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-2 h-8 bg-[#FF6B00] rounded-full"></div>
                    <h2 class="text-2xl font-extrabold tracking-tight">Coin Summary</h2>
                </div>
                <div
                    class="profile-card p-8 border-l-4 border-l-[#FF6B00] flex items-center justify-between shadow-2xl">
                    <div>
                        <p class="text-sm font-medium text-gray-400 mb-1 uppercase tracking-widest">Available Balance
                        </p>
                        <div class="flex items-baseline gap-2">
                            <h3 id="totalCoinsDisplay" class="text-5xl font-black text-white">0</h3>
                            <span class="text-[#FF6B00] font-bold text-xl">Coins</span>
                        </div>
                    </div>
                    <div class="bg-[#242424] p-4 rounded-full">
                        <span class="text-5xl">🪙</span>
                    </div>
                </div>
            </section>

            <!-- Coin History Section -->
            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-2 h-8 bg-[#FF6B00] rounded-full"></div>
                    <h2 class="text-2xl font-extrabold tracking-tight">Coin History</h2>
                </div>
                <div class="profile-card overflow-hidden shadow-xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-[#1F1F1F] border-b border-[#2A2A2A]">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-widest">Date
                                    </th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-widest">
                                        Action</th>
                                    <th
                                        class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-widest text-right">
                                        Coins</th>
                                </tr>
                            </thead>
                            <tbody id="coinHistoryBody" class="divide-y divide-[#242424]">
                                <!-- Rows populated by profile.js -->
                                <tr>
                                    <td colspan="3" class="px-6 py-8 text-center">
                                        <div class="flex flex-col items-center gap-3">
                                            <div
                                                class="w-6 h-6 border-2 border-gray-600 border-t-[#FF6B00] rounded-full animate-spin">
                                            </div>
                                            <span class="text-gray-500 text-sm">Fetching transaction history...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
