<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container" style="max-width:800px;">
            <div class="card" id="profileView">
                <div class="spinner"></div>
            </div>

            <div style="margin-top:2rem;">
                <h2 style="font-size:1.25rem; font-weight:700; margin-bottom:1rem;">Coin History</h2>
                <div id="coinHistory">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('profile');
        if (!requireAuth()) return;

        (async function () {
            try {
                const dash = await api.getDashboard();
                const user = api.getUser();

                document.getElementById('profileView').innerHTML = `
                    <div class="profile-header">
                        <div class="avatar">${(dash.displayName || dash.username)[0].toUpperCase()}</div>
                        <div>
                            <h1 style="font-size:1.75rem; font-weight:800;">${dash.displayName || dash.username}</h1>
                            <p style="color:var(--text-secondary);">@${dash.username}</p>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${dash.totalCoins}</div>
                            <div class="stat-label">🪙 Coins</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${dash.problemsSolved}</div>
                            <div class="stat-label">✅ Solved</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">#${dash.userRank}</div>
                            <div class="stat-label">🏆 Rank</div>
                        </div>
                    </div>
                `;

                const history = await api.getCoinHistory();
                const histEl = document.getElementById('coinHistory');

                // Render LeetCode Section
                const leetcodeSection = document.createElement('div');
                leetcodeSection.style.marginTop = '2rem';
                leetcodeSection.innerHTML = `
                    <div class="card">
                        <h2 style="font-size:1.25rem; font-weight:700; margin-bottom:1rem;">LeetCode Synchronization</h2>
                        <div id="leetcodeContent">
                            <div class="spinner"></div>
                        </div>
                    </div>
                `;
                document.querySelector('.container').insertBefore(leetcodeSection, document.querySelector('h2').closest('div'));

                async function renderLeetcode() {
                    const lcContent = document.getElementById('leetcodeContent');
                    try {
                        const lc = await api.getLeetcodeProfile();
                        lcContent.innerHTML = `
                            <div class="stats-grid" style="margin-bottom:1.5rem;">
                                <div class="stat-card" style="background:rgba(255,107,0,0.05);">
                                    <div class="stat-value" style="font-size:1.25rem;">${lc.easySolved}</div>
                                    <div class="stat-label">Easy</div>
                                </div>
                                <div class="stat-card" style="background:rgba(255,107,0,0.05);">
                                    <div class="stat-value" style="font-size:1.25rem;">${lc.mediumSolved}</div>
                                    <div class="stat-label">Medium</div>
                                </div>
                                <div class="stat-card" style="background:rgba(255,107,0,0.05);">
                                    <div class="stat-value" style="font-size:1.25rem;">${lc.hardSolved}</div>
                                    <div class="stat-label">Hard</div>
                                </div>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <p style="font-weight:600;">@${lc.leetcodeUsername}</p>
                                    <p style="font-size:0.75rem; color:var(--text-secondary);">
                                        Last synced: ${lc.lastSyncedAt ? new Date(lc.lastSyncedAt).toLocaleString() : 'Never'}
                                    </p>
                                </div>
                                <button class="btn btn-primary" id="syncBtn">Sync Now</button>
                            </div>
                        `;
                        document.getElementById('syncBtn').onclick = async () => {
                            const btn = document.getElementById('syncBtn');
                            btn.disabled = true;
                            btn.innerText = 'Syncing...';
                            try {
                                await api.syncLeetcode();
                                alert('LeetCode progress synced successfully!');
                                location.reload();
                            } catch (err) {
                                alert(err.message);
                                btn.disabled = false;
                                btn.innerText = 'Sync Now';
                            }
                        };
                    } catch (err) {
                        lcContent.innerHTML = `
                            <p style="color:var(--text-secondary); margin-bottom:1rem;">Connect your LeetCode account to earn coins for your progress.</p>
                            <div style="display:flex; gap:0.5rem;">
                                <input type="text" id="lcUsername" class="input" placeholder="LeetCode Username" style="flex:1;">
                                <button class="btn btn-primary" id="connectBtn">Connect</button>
                            </div>
                        `;
                        document.getElementById('connectBtn').onclick = async () => {
                            const username = document.getElementById('lcUsername').value;
                            if (!username) return;
                            try {
                                await api.connectLeetcode(username);
                                alert('LeetCode account connected!');
                                renderLeetcode();
                            } catch (err) {
                                alert(err.message);
                            }
                        };
                    }
                }
                renderLeetcode();

                if (history.length === 0) {

                    histEl.innerHTML = '<div class="empty-state"><p>No transaction history.</p></div>';
                } else {
                    histEl.innerHTML = `
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Reason</th>
                                        <th style="text-align:right">Amount</th>
                                        <th style="text-align:right">Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${history.map(tx => `
                                        <tr>
                                            <td>${tx.reason}</td>
                                            <td style="text-align:right; font-weight:600; color:var(--success);">+${tx.amount} 🪙</td>
                                            <td style="text-align:right; color:var(--text-secondary); font-size:0.8125rem;">
                                                ${new Date(tx.createdAt).toLocaleDateString()}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('profileView').innerHTML = '<div class="empty-state"><p>Could not load profile.</p></div>';
            }
        })();
    </script>
</body>

</html>
