<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --bg-primary: #0F0F0F;
            --bg-secondary: #1A1A1A;
            --accent: #FF6B00;
            --accent-hover: #FF8C32;
        }

        body {
            background-color: var(--bg-primary);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .profile-card {
            background-color: var(--bg-secondary);
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .profile-card:hover {
            border-color: #3A3A3A;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .transaction-card {
            background: linear-gradient(to right, #1A1A1A, #141414);
            border-left: 4px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transaction-card:hover {
            background: #222;
            transform: translateX(4px);
        }

        .transaction-positive {
            border-left-color: #00C853;
        }

        .transaction-negative {
            border-left-color: #FF3D00;
        }

        .amount-badge {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            letter-spacing: -0.5px;
        }

        /* Modal Styles */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--bg-primary);
            border: 1px solid #2A2A2A;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            border-bottom: 1px solid #242424;
            padding: 1.5rem;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
        }

        .primary-btn {
            background-color: #242424;
            border: 1px solid #333;
            transition: all 0.2s ease;
        }

        .primary-btn:hover {
            border-color: var(--accent);
            background-color: #2A2A2A;
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content min-h-screen pt-24 pb-12">
        <div class="container mx-auto px-4 max-w-5xl space-y-8">

            <!-- Hero Section -->
            <section
                class="profile-hero p-8 rounded-3xl relative overflow-hidden flex flex-col md:flex-row items-center gap-8 shadow-2xl">
                <div class="absolute inset-0 bg-gradient-to-br from-[#FF6B00]/10 to-transparent pointer-events-none">
                </div>
                <div class="relative z-10 w-32 h-32 rounded-full bg-gradient-to-br from-[#3A245E] to-[#1B1031] border-2 border-[#FF6B00]/40 flex items-center justify-center text-4xl font-black text-[#FFD8B8] shadow-lg shadow-[#FF6B00]/20"
                    id="profileAvatar">
                    --
                </div>
                <div class="relative z-10 flex-1 text-center md:text-left space-y-2">
                    <h1 id="profileUsername" class="text-4xl font-black tracking-tight text-white">...</h1>
                    <p id="profileEmail" class="text-lg font-medium text-gray-400 opacity-80">...</p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4 mt-4">
                        <div
                            class="px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-bold text-[#FF6B00] uppercase tracking-widest">
                            Pro Member
                        </div>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left Column: Coins & LeetCode -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- Coin Summary Card -->
                    <div class="profile-card p-8 flex items-center justify-between group h-48">
                        <div class="space-y-2">
                            <p class="text-xs font-black text-gray-500 uppercase tracking-[0.2em]">Total Balance</p>
                            <div class="flex items-baseline gap-3">
                                <h3 id="totalCoinsDisplay" class="text-6xl font-black text-white tracking-tighter">0
                                </h3>
                                <span class="text-[#FF6B00] font-bold text-xl uppercase italic">Coins</span>
                            </div>
                        </div>
                        <div class="coin-icon-container relative">
                            <div
                                class="absolute inset-0 bg-[#FF6B00]/20 rounded-full blur-2xl group-hover:bg-[#FF6B00]/30 transition-all duration-500">
                            </div>
                            <span class="text-7xl relative z-10 animate-float">🪙</span>
                        </div>
                    </div>

                    <!-- LeetCode Card -->
                    <div class="profile-card p-8 space-y-8">
                        <div class="flex items-center justify-between border-b border-white/5 pb-6">
                            <div class="flex items-center gap-4">
                                <div class="bg-white/5 p-3 rounded-2xl border border-white/10 shadow-inner">
                                    <img src="https://assets.leetcode.com/static_assets/public/icons/favicon-192x192.png"
                                        alt="LeetCode"
                                        class="w-10 h-10 grayscale opacity-80 group-hover:grayscale-0 transition-all">
                                </div>
                                <div>
                                    <h3 class="text-xl font-black text-white">LeetCode Stats</h3>
                                    <p id="displayLeetcodeUsername"
                                        class="text-xs font-bold text-[#FF6B00] uppercase tracking-widest mt-1 opacity-0 transition-opacity">
                                        ...</p>
                                </div>
                            </div>
                            <div id="leetcodeSyncView" class="hidden">
                                <button id="syncLeetcodeBtn"
                                    class="primary-btn px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest flex items-center gap-2 group border border-white/5">
                                    <span id="syncIcon" class="text-lg">🔄</span>
                                    <span>Sync</span>
                                </button>
                            </div>
                        </div>

                        <div id="leetcodeConnectView" class="hidden py-4 text-center space-y-6">
                            <p class="text-gray-400 text-sm max-w-md mx-auto leading-relaxed">Boost your rank! Connect
                                your LeetCode and earn coins for every challenge conquered.</p>
                            <div class="flex flex-col md:flex-row gap-3 max-w-md mx-auto">
                                <input type="text" id="leetcodeUsernameInput" placeholder="LeetCode Username"
                                    class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#FF6B00] transition-all">
                                <button id="connectLeetcodeBtn"
                                    class="bg-[#FF6B00] hover:bg-[#FF8C32] text-black font-black py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg shadow-[#FF6B00]/20 text-xs uppercase tracking-widest">
                                    Connect
                                </button>
                            </div>
                        </div>

                        <div id="lcStatsView" class="hidden">
                            <div class="grid grid-cols-3 gap-6">
                                <div class="stat-bubble p-4 rounded-3xl text-center space-y-1 group">
                                    <p
                                        class="text-[10px] font-black text-[#00C853] uppercase tracking-widest opacity-60">
                                        Easy</p>
                                    <p id="easySolvedCount"
                                        class="text-3xl font-black group-hover:scale-110 transition-transform">0</p>
                                </div>
                                <div class="stat-bubble p-4 rounded-3xl text-center space-y-1 group">
                                    <p
                                        class="text-[10px] font-black text-[#FFD600] uppercase tracking-widest opacity-60">
                                        Medium</p>
                                    <p id="mediumSolvedCount"
                                        class="text-3xl font-black group-hover:scale-110 transition-transform">0</p>
                                </div>
                                <div class="stat-bubble p-4 rounded-3xl text-center space-y-1 group">
                                    <p
                                        class="text-[10px] font-black text-[#FF3D00] uppercase tracking-widest opacity-60">
                                        Hard</p>
                                    <p id="hardSolvedCount"
                                        class="text-3xl font-black group-hover:scale-110 transition-transform">0</p>
                                </div>
                            </div>
                            <p id="lastSyncedText"
                                class="text-[10px] text-gray-600 font-bold uppercase tracking-widest text-center mt-6">
                                Never synced</p>
                        </div>
                    </div>
                </div>

                <!-- Right Column: History -->
                <div class="space-y-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-black text-gray-500 uppercase tracking-[0.2em]">Recent History</h3>
                        <button id="viewAllHistoryBtn"
                            class="text-[10px] font-black text-[#FF6B00] uppercase tracking-widest hover:underline hidden">View
                            All</button>
                    </div>
                    <div class="space-y-3" id="coinHistoryContainer">
                        <div class="px-6 py-12 text-center text-gray-600">
                            <div
                                class="w-6 h-6 border-2 border-white/5 border-t-[#FF6B00] rounded-full animate-spin mx-auto mb-3">
                            </div>
                            <span class="text-[10px] font-bold uppercase tracking-widest">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal remains mostly same but styled for glassmorphism -->
    <div id="historyModal" class="modal-overlay fixed inset-0 hidden flex items-center justify-center p-4">
        <div class="modal-content glass-card flex flex-col scale-95 transition-all duration-300"
            id="historyModalContent">
            <div class="modal-header flex items-center justify-between border-b border-white/5 pb-4">
                <h3 class="text-xl font-black text-white tracking-tight">Transaction History</h3>
                <button id="closeHistoryModal"
                    class="p-2 hover:bg-white/5 rounded-full transition-colors text-gray-500 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="modal-body space-y-3 pt-6" id="modalHistoryContainer"></div>
        </div>
    </div>

    <style>
        :root {
            --bg-primary: #09090B;
            --accent: #FF6B00;
        }

        body {
            background: linear-gradient(135deg, #09090B 0%, #121217 100%);
            background-attachment: fixed;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .profile-hero {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            animation: fadeInUp 0.5s ease both;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            backdrop-filter: blur(12px);
            animation: fadeInUp 0.5s ease both 0.1s;
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 107, 0, 0.2);
            transform: translateY(-2px);
        }

        .stat-bubble {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .transaction-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.25rem;
            transition: all 0.2s ease;
            animation: fadeInUp 0.4s ease both;
        }

        .transaction-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        .glass-card {
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }

        .primary-btn {
            background: var(--bg-primary);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .primary-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.15);
            transform: translateY(-1px);
        }

        /* Staggered animations for history cards */
        #coinHistoryContainer .transaction-card:nth-child(1) {
            animation-delay: 0.3s;
        }

        #coinHistoryContainer .transaction-card:nth-child(2) {
            animation-delay: 0.35s;
        }

        #coinHistoryContainer .transaction-card:nth-child(3) {
            animation-delay: 0.4s;
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
