<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Create account</h1>
            <p class="subtitle">Join CodeClash and start coding</p>

            <div id="alert" class="alert alert-error"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" class="form-input" placeholder="How should we call you?"
                        required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required
                        minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Create Account</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('register');

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const displayName = document.getElementById('displayName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const data = await api.register(username, email, password, displayName);
                api.setAuth(data);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showAlert('alert', err.message);
            }
        });
    </script>
</body>

</html>
