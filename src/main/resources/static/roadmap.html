<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeClash Roadmap</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/timeline.css">
  <script src="https://kit.fontawesome.com/4b8b0b6b7b.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gradient-to-br from-primary-100 to-primary-300 min-h-screen flex flex-col items-center">
  <div class="container mx-auto py-10">
    <h1 class="text-4xl font-extrabold text-primary-900 mb-8 text-center">🚀 CodeClash DSA Roadmap</h1>
    <div id="timeline" class="timeline"></div>
    <div class="mt-8 flex justify-center gap-8">
      <div class="bg-white rounded-xl shadow p-4 flex flex-col items-center">
        <span class="text-2xl font-bold text-accent" id="xpPoints">XP: 0</span>
        <span class="badge hidden" id="levelBadge">Level Complete!</span>
        <span class="streak-counter" id="streakCounter">Streak: 0 🔥</span>
      </div>
    </div>
  </div>
  <div id="problemModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-xl p-8 w-full max-w-lg relative">
      <button id="closeModal" class="absolute top-4 right-4 text-gray-500 hover:text-primary-500 text-2xl">&times;</button>
      <h2 class="text-2xl font-bold mb-4" id="modalLevelTitle"></h2>
      <ul id="problemList" class="mb-4"></ul>
      <div class="text-xs text-gray-400">* Only 3 test cases are visible. Hidden test cases are used for evaluation.</div>
    </div>
  </div>
  <script src="js/timeline.js"></script>
</body>
</html>
